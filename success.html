<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تم بنجاح | Al-Rafeeq</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6; /* نفس خلفية المنصة */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            direction: rtl;
        }
        
        .success-box {
            background: white;
            padding: 50px 40px;
            border-radius: 16px; /* حواف ناعمة */
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); /* ظل عصري */
            max-width: 400px;
            width: 90%;
            border: none;
        }

        .brand-logo {
            font-size: 28px;
            font-weight: 900;
            color: #a435f0;
            margin-bottom: 25px;
            letter-spacing: -0.5px;
        }

        /* تصميم أيقونة النجاح الجديدة */
        .icon-container {
            width: 80px;
            height: 80px;
            background-color: #e8f5e9;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 25px auto;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.15);
        }

        .icon-container svg {
            width: 40px;
            height: 40px;
            color: #28a745;
        }

        h2 { 
            margin: 0 0 15px 0; 
            color: #1c1d1f; 
            font-weight: 800;
            font-size: 24px;
        }

        p { 
            color: #4a4a4a; 
            line-height: 1.6; 
            margin-bottom: 35px; 
            font-size: 15px;
            font-weight: 500;
        }

        .btn-primary {
            display: block; /* لضبط الحجم */
            background-color: #a435f0;
            color: white;
            text-decoration: none;
            width: 100%;
            padding: 16px;
            box-sizing: border-box;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 800;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(164, 53, 240, 0.3);
        }

        .btn-primary:hover {
            background-color: #8710d8;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(164, 53, 240, 0.4);
        }
    </style>
</head>
<body>

    <div class="success-box">
        <div class="brand-logo">Al-Rafeeq</div>
        
        <div class="icon-container">
            <svg fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"></path>
            </svg>
        </div>
        
        <h2>تم إرسال طلبك بنجاح!</h2>
        <p>استلمنا إيصال الدفع الخاص بك. جاري مراجعة الطلب، وسيتم تفعيل الكورس تلقائياً على حسابك خلال ساعات قليلة بمجرد التأكد من الدفع.</p>
        
        <a href="index.html" class="btn-primary">الرجوع للصفحة الرئيسية</a>
    </div>

</body>
</html>
